name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Setup Node js
        uses: ./.github/actions/setupnode
      - name: Run Tests
        run: pnpm test
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Setup Node js
        uses: ./.github/actions/setupnode
        with:
          node-version: 22
      - name: Build Project
        run: pnpm build
      - name: Upload Dist Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: dist
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write 
      id-token: write  
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}