name: Deploy to Development
on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore:
      - README.md
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Setup Node js
        uses: ./.github/actions/setupnode
      - name: Run Tests
        run: pnpm test
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Setup Node js
        uses: ./.github/actions/setupnode
      - name: Build Project
        run: pnpm build
      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist
      - name: Deploy to Development
        run: echo "Deploying to Development Environment"
