name: Deploy to Development
on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore:
      - README.md
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        # - name: Setup pnpm
        #   uses: pnpm/action-setup@v4
        # - name: Setup Node js
        #   uses: actions/setup-node@v4
        #   with:
        #     node-version: 22
        #     cache: 'pnpm'
      - name: Setup Node js
        uses: ./.github/actions/setupnode
      - name: Run Tests
        run: pnpm test -- --watchAll=false
      - name: Completed Job
        run: echo "Tests Completed Successfully"
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node js
        uses: ./.github/actions/setupnode
      - name: Build Project
        run: pnpm build
      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
      - name: Completed Job
        run: echo "Build Completed Successfully"
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist
      - name: Deploy to Development
        run: echo "Deploying to Development Environment"
