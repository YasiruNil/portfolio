name: Deploy to Development
on: push
jobs: 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        # run: |
        #   echo "CLONING REPOSITORY"
        #   git clone git@github.com:username/${{github.repository}}.git myFiles
        #   cd myFiles && ls
      - name: Setup Node js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Print Node Version
        run: node -v
      - name: Install Dependencies
        run: pnpm install
        working-directory: yasiru-portfolio
      - name: Run Tests
        run: pnpm test
        working-directory: yasiru-portfolio
      - name: Completed Job
        run: echo "Tests Completed Successfully"

  